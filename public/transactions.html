<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .summary-cards {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
        }

        .completed { background-color: green; }
        .pending { background-color: orange; }

        .search-box {
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
        }
    </style>
</head>
<body class="login-body">

<div class="login-container">

    <h1 class="brand">FARMZY</h1>
    <h2 class="title">Transaction History</h2>

    <!-- SUMMARY CARDS -->
    <div class="summary-cards">
        <div class="card">
            <h3>Total Transactions</h3>
            <p id="totalCount">0</p>
        </div>
        <div class="card">
            <h3>Total Paid</h3>
            <p id="totalPaid">₹ 0</p>
        </div>
        <div class="card">
            <h3>Pending Amount</h3>
            <p id="pendingAmount">₹ 0</p>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Transaction ID..." onkeyup="filterTransactions()">
    </div>

    <!-- TABLE -->
    <table class="admin-table" id="transactionTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <br>
    <a href="/dashboard.html" class="primary-btn">Back to Dashboard</a>

</div>

<script>
let allTransactions = [];

async function loadTransactions() {

    const user = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!user) {
        window.location.href = "/login.html";
        return;
    }

    const response = await fetch(`/company/transactions/${user.id}`);
    const transactions = await response.json();

    allTransactions = transactions;

    updateSummary(transactions);
    renderTable(transactions);
}

function updateSummary(transactions) {

    let totalPaid = 0;
    let pending = 0;

    transactions.forEach(t => {
        if (t.status === "Completed") {
            totalPaid += t.amount;
        } else {
            pending += t.amount;
        }
    });

    document.getElementById("totalCount").innerText = transactions.length;
    document.getElementById("totalPaid").innerText = "₹ " + totalPaid;
    document.getElementById("pendingAmount").innerText = "₹ " + pending;
}

function renderTable(transactions) {

    const tbody = document.querySelector("#transactionTable tbody");
    tbody.innerHTML = "";

    if (transactions.length === 0) {
        tbody.innerHTML = "<tr><td colspan='4'>No transactions found</td></tr>";
        return;
    }

    transactions.forEach(t => {

        const statusClass = t.status === "Completed" ? "completed" : "pending";

        const row = `
            <tr>
                <td>${t.id}</td>
                <td>₹ ${t.amount}</td>
                <td><span class="badge ${statusClass}">${t.status}</span></td>
                <td>${t.date}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });
}

function filterTransactions() {

    const searchValue = document.getElementById("searchInput").value.toLowerCase();

    const filtered = allTransactions.filter(t =>
        t.id.toLowerCase().includes(searchValue)
    );

    renderTable(filtered);
}

loadTransactions();
</script>

</body>
</html>
