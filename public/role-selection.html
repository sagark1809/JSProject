<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Role Selection - FarmZy</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

<section class="role-section">

    <h1 class="brand-title">FARMZY</h1>
    <h2 class="page-heading">Welcome to Farmzy</h2>

    <div class="role-container">

        <!-- Farmer -->
        <div class="role-card">
            <div class="role-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png" alt="Farmer">
            </div>
            <a href="admin-login.html" class="primary-btn">Login as Admin</a>

        </div>

        <!-- Company -->
        <div class="role-card">
            <div class="role-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Company">
            </div>
            <a href="login.html?role=company" class="primary-btn">Login as Company</a>

        </div>

    </div>

</section>

</body>
</html>
