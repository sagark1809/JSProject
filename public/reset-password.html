<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - FarmZY</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

<div class="login-container">

    <h1 class="brand">FARMZY</h1>

    <h2 class="title">Reset Password</h2>
    <p class="subtitle">Enter your new password</p>

    <form class="login-form" id="resetForm">

        <div class="input-wrapper">
            <input type="password" id="newPassword" placeholder="New Password" required>
        </div>

        <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="primary-btn full-btn">Reset Password</button>

    </form>

</div>

<script>
function getIdentifier() {
    const params = new URLSearchParams(window.location.search);
    return params.get("identifier");
}

document.getElementById("resetForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const identifier = getIdentifier();

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    const response = await fetch("/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier, newPassword })
    });

    const result = await response.json();

    if (result.success) {
        alert("Password reset successful");
        window.location.href = "login.html";
    } else {
        alert(result.message || "Error resetting password");
    }
});
</script>

</body>
</html>
