<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - FarmZY</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

<div class="login-container">

    <h1 class="brand">FARMZY</h1>

    <h2 class="title">Verify OTP</h2>
    <p class="subtitle">Enter the OTP sent to your mobile</p>

    <form class="login-form" id="otpForm">

        <div class="input-wrapper">
            <input type="text" id="otp" placeholder="Enter OTP" required>
        </div>

        <button type="submit" class="primary-btn full-btn">Verify</button>

    </form>

</div>

<script>
function getIdentifier() {
    const params = new URLSearchParams(window.location.search);
    return params.get("identifier");
}

document.getElementById("otpForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const otp = document.getElementById("otp").value.trim();
    const identifier = getIdentifier();

    if (!otp) {
        alert("Enter OTP");
        return;
    }

    const response = await fetch("/verify-reset-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier, otp })
    });

    const result = await response.json();

    if (result.success) {
        window.location.href = "reset-password.html?identifier=" + identifier;
    } else {
        alert("Invalid OTP");
    }
});
</script>

</body>
</html>
