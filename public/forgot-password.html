<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FarmZY</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

<div class="login-container">

    <h1 class="brand">FARMZY</h1>

    <h2 class="title">Forgot Password</h2>
    <p class="subtitle">Enter your registered mobile number</p>

    <form class="login-form" id="forgotForm">

        <div class="input-wrapper">
            <input type="text" id="identifier" placeholder="Registration Number" required>
        </div>

        <p class="link-text">
            <a href="login.html">Back to Login</a>
        </p>

        <button type="submit" class="primary-btn full-btn">Send OTP</button>

    </form>

</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const identifier = document.getElementById("identifier").value.trim();

    if (!identifier) {
        alert("Please enter registration number.");
        return;
    }

    const response = await fetch("/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier })
    });

    const result = await response.json();

    if (result.success) {
        window.location.href = "verify-otp.html?identifier=" + identifier;
    } else {
        alert(result.message || "User not found");
    }
});
</script>

</body>
</html>
